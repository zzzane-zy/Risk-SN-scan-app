<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#17231f">
    <title>风险货物扫码核验</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Risk SN Check</p>
          <h1>风险货物扫码核验</h1>
        </div>
        <button class="ghost-action" id="cloudButton" type="button">云端配置</button>
      </header>

      <section class="status-strip" aria-live="polite">
        <div class="status-pill">
          <span class="status-dot" id="dataDot"></span>
          <span id="dataStatus">加载风险清单</span>
        </div>
        <div class="status-pill cloud-pill" id="cloudStatus">内置云端</div>
      </section>

      <section class="scan-stage" id="scanStage" aria-label="相机扫码">
        <div class="camera-frame">
          <video id="video" playsinline muted></video>
          <div class="scan-mask" aria-hidden="true">
            <span></span>
          </div>
          <div class="camera-empty" id="cameraEmpty">
            <strong>相机未开启</strong>
            <small id="cameraHint">等待风险清单</small>
          </div>
        </div>

        <div class="controls">
          <button class="primary-action" id="startButton" type="button" disabled>开始扫码</button>
          <button class="secondary-action" id="stopButton" type="button" disabled>停止</button>
          <button class="secondary-action" id="cameraButton" type="button">切换相机</button>
          <label class="secondary-action file-action">
            图片识别
            <input id="imageInput" type="file" accept="image/*" capture="environment">
          </label>
        </div>
      </section>

      <section class="history-panel" aria-label="最近三次核验">
        <div class="section-title">
          <h2>最近三次核验</h2>
          <button class="text-action" id="clearHistoryButton" type="button">清空</button>
        </div>
        <ol id="historyList"></ol>
      </section>

      <section class="manual-panel" aria-label="输入核验">
        <form id="manualForm">
          <label for="manualInput">输入/粘贴 SN / PDA</label>
          <div class="manual-row">
            <input id="manualInput" autocomplete="off" autocapitalize="characters" inputmode="text" spellcheck="false" placeholder="P010100...">
            <button class="primary-action" type="submit">核验</button>
          </div>
        </form>
      </section>
    </main>

    <div class="modal-backdrop" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="resultModalTitle" hidden>
      <div class="modal-card result-dialog">
        <h2 id="resultModalTitle">核验结果</h2>
        <code id="resultModalCode">--</code>
        <p id="resultModalMessage"></p>
        <button class="primary-action" id="resultModalOk" type="button">确定</button>
      </div>
    </div>

    <div class="modal-backdrop" id="configModal" role="dialog" aria-modal="true" aria-labelledby="configTitle" hidden>
      <form class="modal-card config-dialog" id="configForm">
        <div class="modal-title-row">
          <h2 id="configTitle">云端配置</h2>
          <button class="text-action" id="closeConfigButton" type="button">关闭</button>
        </div>

        <label for="operatorInput">操作人</label>
        <input id="operatorInput" autocomplete="off" placeholder="可选">

        <label for="supabaseUrlInput">Supabase URL</label>
        <input id="supabaseUrlInput" autocomplete="off" inputmode="url" placeholder="留空使用内置配置">

        <label for="supabaseKeyInput">Supabase anon/public key</label>
        <input id="supabaseKeyInput" autocomplete="off" placeholder="留空使用内置配置">

        <div class="device-row">
          <span>设备名称</span>
          <strong id="deviceNameText">--</strong>
        </div>

        <label class="check-row">
          <input id="testDeviceInput" type="checkbox">
          <span>注册为 Test 设备</span>
        </label>

        <div class="config-actions">
          <button class="secondary-action" id="resetConfigButton" type="button">恢复内置</button>
          <button class="primary-action" type="submit">保存</button>
        </div>
      </form>
    </div>

    <script type="module" src="./src/app.js?v=7"></script>
  </body>
</html>
